<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "pastel-peach": "#FFE5D9",
                        "pastel-blue": "#B4E4FF",
                        "pastel-purple": "#E5C1FF",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .mesh-gradient {
            background-color: #FFE5D9;
            background-image: 
                radial-gradient(at 0% 0%, #B4E4FF 0px, transparent 50%),
                radial-gradient(at 100% 0%, #E5C1FF 0px, transparent 50%),
                radial-gradient(at 100% 100%, #FFE5D9 0px, transparent 50%),
                radial-gradient(at 0% 100%, #B4E4FF 0px, transparent 50%);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .stardust-glow {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }
        
        .spinner-ring {
            border-top-color: transparent;
            border-left-color: transparent;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#111418] overflow-hidden">
<div class="relative min-h-screen w-full flex flex-col items-center justify-center mesh-gradient">
<!-- Top Navigation (Subtle for Loading Screen) -->
<header class="fixed top-0 left-0 w-full flex items-center justify-between px-10 py-6 z-10">
<div class="flex items-center gap-3">
<div class="size-8 bg-white/40 backdrop-blur-md rounded-lg flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="auto_stories">auto_stories</span>
</div>
<h2 class="text-[#111418] text-lg font-bold leading-tight tracking-tight">Story AI</h2>
</div>
<div class="flex items-center gap-6">
<div class="bg-white/40 backdrop-blur-md rounded-full px-4 py-1.5 flex items-center gap-2 border border-white/20">
<span class="size-2 rounded-full bg-green-400 animate-pulse"></span>
<span class="text-xs font-semibold text-[#111418]/70 uppercase tracking-widest">Processing</span>
</div>
</div>
</header>
<!-- Main Loading Content -->
<main class="flex flex-col items-center justify-center px-4 text-center max-w-2xl w-full">
<!-- Central Animation Container -->
<div class="relative size-64 md:size-80 mb-12 flex items-center justify-center">
<!-- Glowing Background Ring -->
<div class="absolute inset-0 rounded-full border-4 border-white/30 border-t-primary/40 animate-[spin_3s_linear_infinite] shadow-[0_0_40px_rgba(19,127,236,0.15)]"></div>
<!-- Inner Rotating Tools Layer -->
<div class="relative size-full flex items-center justify-center animate-float">
<!-- Art Tool 1: Pencils -->
<div class="absolute -top-4 -left-4 size-32 bg-pastel-peach rounded-2xl rotate-[-15deg] shadow-xl flex items-center justify-center border-4 border-white">
<span class="material-symbols-outlined text-5xl text-orange-400/80" data-icon="edit_note">edit_note</span>
</div>
<!-- Art Tool 2: Paintbrush (Center Focus) -->
<div class="z-20 size-40 bg-white rounded-full shadow-2xl flex items-center justify-center border-8 border-white group">
<div class="size-full rounded-full bg-gradient-to-br from-pastel-blue via-white to-pastel-purple flex items-center justify-center overflow-hidden">
<div class="flex flex-col items-center gap-2 transform group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-7xl text-primary" data-icon="brush">brush</span>
<div class="flex gap-1">
<div class="size-1.5 bg-pastel-peach rounded-full animate-bounce"></div>
<div class="size-1.5 bg-pastel-blue rounded-full animate-bounce [animation-delay:0.2s]"></div>
<div class="size-1.5 bg-pastel-purple rounded-full animate-bounce [animation-delay:0.4s]"></div>
</div>
</div>
</div>
</div>
<!-- Art Tool 3: Palette -->
<div class="absolute -bottom-6 -right-6 size-32 bg-pastel-purple rounded-3xl rotate-[20deg] shadow-xl flex items-center justify-center border-4 border-white">
<span class="material-symbols-outlined text-5xl text-purple-500/80" data-icon="palette">palette</span>
</div>
<!-- Stardust Particles (Floating Orbs) -->
<div class="absolute top-0 right-10 size-4 bg-white rounded-full stardust-glow blur-[1px] animate-pulse"></div>
<div class="absolute bottom-10 left-0 size-3 bg-white/80 rounded-full stardust-glow blur-[1px] animate-pulse [animation-delay:0.5s]"></div>
<div class="absolute top-20 -right-5 size-2 bg-white/60 rounded-full stardust-glow blur-[1px] animate-pulse [animation-delay:1s]"></div>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4 relative z-10">
<h1 class="text-[#111418] text-4xl md:text-5xl font-bold tracking-tight px-4 leading-[1.2]">
                    AI가 그림 그리는 중...
                </h1>
<p class="text-[#111418]/70 text-lg md:text-xl font-medium px-4">
                    잠시만 기다려주세요 ✨
                </p>
<!-- Progress Bar Section -->
<div class="mt-12 w-full max-w-sm mx-auto space-y-3">
<div class="flex justify-between items-end px-1">
<span class="text-primary font-bold text-sm tracking-wider">CREATING MAGIC</span>
<span class="text-[#111418] font-bold text-sm">74%</span>
</div>
<div class="h-4 w-full bg-white/40 backdrop-blur-sm rounded-full overflow-hidden p-1 border border-white/30">
<div class="h-full bg-primary rounded-full shadow-[0_0_10px_rgba(19,127,236,0.3)] transition-all duration-1000" style="width: 74%;"></div>
</div>
<p class="text-[#111418]/50 text-xs font-medium uppercase tracking-[0.2em]">Almost ready to show you</p>
</div>
</div>
</main>
<!-- Footer Caption -->
<footer class="fixed bottom-12 w-full text-center px-6">
<div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-lg px-6 py-3 rounded-full border border-white/30 shadow-sm">
<span class="material-symbols-outlined text-primary text-xl" data-icon="auto_awesome">auto_awesome</span>
<p class="text-[#111418] font-semibold text-sm md:text-base">
                    특별한 이야기를 만들고 있어요 🎨
                </p>
</div>
</footer>
<!-- Background Decorative Elements -->
<div class="fixed top-1/4 -left-20 size-80 bg-pastel-blue/30 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-20 size-80 bg-pastel-purple/30 rounded-full blur-[100px] pointer-events-none"></div>
</div>
<!-- Image placeholders for components that might require them (hidden as this is a loading screen) -->
<div class="hidden">
<img data-alt="Abstract pastel gradient background with floating shapes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEyiWCkeyF17UmZeJ55xibRuxc3XcIEUUL8Jr3BZKIq6uH5QL68tjoMwGgFR4aiGI-me7YqGL6kEtfiB4HJt9fLARlKM6_7UduaNpifZpD2P1cc-c61eWJ2ld2nPpWNxZS1EO8e8TNnLLzgNb7uhjEQ6f3AXQVaIkEZ4qvsiSqXR16gmkglxAJoDleAA0oUjgzPjEzok9JFd3Mfdv7-hHTVbMbU7dpj_LljfXTFB6B4DwS3entIYQ9sl_BV-fYh9Ya3CAYdogH5vw"/>
<img data-alt="Cartoon paintbrush and art supplies floating" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0ar7vwpGQf-HewvF9pLi7l9ybaZo8hdjvvVFnQn1PFLx9Z0oRe0cYW1h_GMrEAYYmeifQZiBGcIjYHMebUF0f2BXkdPSotfSxHUTs-Pnv6Iw-oJSs7QHjkZ-d_Ea0UeyBvOO7jzQUrN3rVhPuFdZYtjnwHBkm7gSEArzE9xVWf2nDRxESlz0Lc1arOeuwdZZY-UE9kjWw2CPYJ9JoTZTA1v_CUjI711SI8cO7thiRHt6sMDxcqs6iBZeFYxyt8Dsnh0rltkDK1v8"/>
</div>
</body></html>
